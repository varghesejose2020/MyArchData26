name: Update Parish Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Priests Data
        run: |
          curl -H "Cache-Control: no-cache" -f -o priests.json "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/all_priests_with_current_ministry"

      - name: Fetch Parishes Data
        run: |
          curl -H "Cache-Control: no-cache" -f -o parishes.json "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/get_all_parishes"

      - name: Check for changes
        run: |
          git diff

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add priests.json parishes.json
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update JSON data"
            git push
          fi
