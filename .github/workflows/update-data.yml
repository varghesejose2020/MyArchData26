name: Update Parish Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Priests Data
        run: |
          curl -L -A "Mozilla/5.0" -H "Cache-Control: no-cache" \
          -o priests.json \
          "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/all_priests_with_current_ministry"

      - name: Fetch Parishes Data
        run: |
          curl -L -A "Mozilla/5.0" -H "Cache-Control: no-cache" \
          -o parishes.json \
          "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/get_all_parishes"

      - name: Preview data (debug)
        run: |
          echo "Priests sample:"
          head -n 5 priests.json
          echo "Parishes sample:"
          head -n 5 parishes.json

      - name: Validate files (not empty)
        run: |
          test -s priests.json
          test -s parishes.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Pull latest changes FIRST (fixes your error)
          git pull --rebase --autostash

          # Stage files
          git add priests.json parishes.json

          # Commit only if there are changes
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update JSON data"
            git push
          fi
