name: Update Parish Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
  contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Priests Data
        run: |
          curl -f -o priests.json "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/all_priests_with_current_ministry"

      - name: Show priests sample
        run: |
          head -n 5 priests.json

      - name: Fetch Parishes Data
        run: |
          curl -f -o parishes.json "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/get_all_parishes"

      - name: Show parishes sample
        run: |
          head -n 5 parishes.json

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add priests.json parishes.json
          git commit -m "Update JSON data" || echo "No changes to commit"
          git push
