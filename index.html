<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archdiocese Changanacherry - Priests</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f7f8;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #1a5276;
      margin-top: 30px;
    }

    .logo-container {
      text-align: center;
      margin-top: 20px;
    }

    .logo-container img {
      width: 100px;
    }

    #search-bar {
      display: block;
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
      padding: 12px;
      border-radius: 25px;
      border: 2px solid #1a5276;
    }

    #priest-count {
      text-align: center;
      font-weight: bold;
      color: #117864;
    }

    #priests-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
      list-style: none;
    }

    .priest-item {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .priest-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .priest-item h3 {
      color: #117864;
      margin: 10px 0 5px;
    }

    #loading-message {
      text-align: center;
      margin: 40px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <div class="logo-container">
    <img src="https://www.archdiocesechanganacherry.org//images/Arch_Logo.jpeg">
  </div>

  <h1>Priests Directory</h1>

  <input type="text" id="search-bar" placeholder="Search priests..." oninput="filterPriests()">

  <p id="priest-count">Total Priests: 0</p>

  <div id="loading-message">Loading...</div>

  <ul id="priests-list"></ul>

<script>
const PRIESTS_API = "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/all_priests_with_current_ministry";
const PARISHES_API = "https://myparish.archeparchybookkeeping.org/index.php/MobileApi/get_all_parishes";

let allPriests = [];

const listEl = document.getElementById('priests-list');
const countEl = document.getElementById('priest-count');
const loadingEl = document.getElementById('loading-message');

function normalize(str) {
  return (str || '').toLowerCase().replace(/[^a-z]/g, '');
}

function fixPhoto(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return url.replace(/^\.\/?/, 'https://myparish.archeparchybookkeeping.org/');
}

async function loadData() {
  try {
    const [priestsRes, parishesRes] = await Promise.all([
      fetch(PRIESTS_API),
      fetch(PARISHES_API)
    ]);

    const priestsJson = await priestsRes.json();
    const parishesJson = await parishesRes.json();

    const parishes = parishesJson.data;

    allPriests = priestsJson.data.map(priest => {

      const ministries = (priest.current_ministry || []).map(m => {

        const match = parishes.find(p =>
          normalize(p.parish_name) === normalize(m.parish_name) &&
          normalize(p.parish_place) === normalize(m.parish_place)
        );

        return {
          parish: m.parish_name,
          place: m.parish_place,
          designation: m.ministry_designation_name,
          forane: match ? match.forane_name : '',
          primary: m.is_primary_ministry == 1
        };
      });

      return {
        name: priest.name,
        nickname: priest.nickname,
        photo: priest.photo,
        ministries
      };
    });

    display(allPriests);
    loadingEl.style.display = 'none';

  } catch (err) {
    loadingEl.innerText = "Failed to load data.";
    console.error(err);
  }
}

function display(priests) {
  listEl.innerHTML = '';
  countEl.textContent = `Total Priests: ${priests.length}`;

  priests.forEach(p => {

    const main = p.ministries.find(m => m.primary) || p.ministries[0];

    const li = document.createElement('li');
    li.className = 'priest-item';

    li.innerHTML = `
      <img src="${fixPhoto(p.photo)}" />
      <h3>${p.name || 'No Name'}</h3>
      ${p.nickname ? `<p>${p.nickname}</p>` : ''}

      ${main ? `
        <p><b>${main.designation}</b></p>
        <p>${main.parish}, ${main.place}</p>
        <p style="color:gray;">${main.forane || ''}</p>
      ` : ''}
    `;

    listEl.appendChild(li);
  });
}

function filterPriests() {
  const q = document.getElementById('search-bar').value.toLowerCase();

  const filtered = allPriests.filter(p => {

    return (
      p.name?.toLowerCase().includes(q) ||
      p.nickname?.toLowerCase().includes(q) ||
      p.ministries.some(m =>
        m.parish?.toLowerCase().includes(q) ||
        m.designation?.toLowerCase().includes(q) ||
        m.forane?.toLowerCase().includes(q)
      )
    );
  });

  display(filtered);
}

loadData();
</script>

</body>
</html>
