<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Priests Directory — Archdiocese of Changanacherry</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --maroon: #7a1f2b;
    --maroon-deep: #5c161f;
    --gold: #b8860b;
    --gold-soft: #d9b96a;
    --forest: #35524a;
    --parchment: #f6f1e6;
    --card: #fffdf9;
    --ink: #2b2420;
    --ink-soft: #6b6154;
    --hairline: #e4dac6;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(43,36,32,0.04), 0 8px 24px rgba(43,36,32,0.07);
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #fbf6ea 0%, var(--parchment) 55%),
      var(--parchment);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Header ---------- */
  header{
    padding: 48px 20px 28px;
    text-align: center;
    position: relative;
  }

  .logo-container img{
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 50%;
    box-shadow: var(--shadow);
    background: #fff;
    padding: 6px;
  }

  .eyebrow{
    margin: 18px 0 4px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }

  h1{
    margin: 0;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(32px, 5vw, 48px);
    color: var(--maroon-deep);
    letter-spacing: 0.01em;
  }

  .rule{
    width: 84px;
    height: 3px;
    margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  /* ---------- Search & stats ---------- */
  .controls{
    max-width: 560px;
    margin: 32px auto 6px;
    padding: 0 20px;
  }

  #search-bar{
    display: block;
    width: 100%;
    padding: 14px 20px;
    border-radius: 999px;
    border: 1.5px solid var(--hairline);
    background: var(--card);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    box-shadow: var(--shadow);
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  #search-bar::placeholder{ color: #a89b85; }

  #search-bar:focus{
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(184,134,11,0.14), var(--shadow);
  }

  #priest-count{
    text-align: center;
    margin: 16px 0 8px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--forest);
  }

  #loading-message{
    text-align: center;
    margin: 60px 20px;
    font-size: 15px;
    color: var(--ink-soft);
  }

  /* ---------- Grid ---------- */
  #priests-list{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 22px;
    padding: 24px clamp(16px, 4vw, 40px) 80px;
    max-width: 1240px;
    margin: auto;
    list-style: none;
  }

  .priest-item{
    background: var(--card);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    gap: 14px;
    box-shadow: var(--shadow);
    position: relative;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .priest-item:hover{
    transform: translateY(-3px);
    box-shadow: 0 4px 8px rgba(43,36,32,0.05), 0 16px 32px rgba(43,36,32,0.1);
  }

  .priest-item img{
    width: 74px;
    height: 92px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--hairline);
    flex-shrink: 0;
  }

  .priest-info{ flex: 1; min-width: 0; }

  .priest-item h3{
    margin: 0 0 2px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    line-height: 1.2;
  }

  .nickname{
    margin: 0 0 6px;
    font-size: 12.5px;
    font-style: italic;
    color: var(--ink-soft);
  }

  .ministry-block{
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--hairline);
  }

  .ministry-block:first-of-type{
    margin-top: 8px;
  }

  .designation{
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--maroon);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .parish{
    color: var(--forest);
    font-size: 13.5px;
    margin-top: 2px;
  }

  .forane{
    display: inline-block;
    background: rgba(53,82,74,0.1);
    color: var(--forest);
    padding: 2px 9px;
    border-radius: 6px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-top: 6px;
  }

  .appointment-date{
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Recent appointment framing — quiet gold rail, not a loud box */
  .recent-appointment{
    border-color: var(--gold-soft);
  }

  .recent-appointment::before{
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 3px;
    border-radius: 3px;
    background: linear-gradient(180deg, var(--gold), var(--maroon));
  }

  /* Wax-seal "new appointment" badge — the signature element */
  .seal{
    position: absolute;
    top: -10px;
    right: -8px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 30%, #c8940f, var(--maroon) 78%);
    box-shadow: 0 3px 6px rgba(90,20,25,0.35), inset 0 0 0 2px rgba(255,255,255,0.15);
    transform: rotate(-9deg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .seal::before{
    content: '+';
    color: #f8ecc9;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .seal-label{
    position: absolute;
    top: 26px;
    right: -22px;
    font-size: 8.5px;
    letter-spacing: 0.08em;
    color: var(--maroon-deep);
    font-weight: 700;
    text-transform: uppercase;
    transform: rotate(-9deg);
  }

  @media (max-width: 420px){
    .priest-item{ padding: 14px; gap: 10px; }
    .priest-item img{ width: 62px; height: 78px; }
  }

  /* ---------- Recently joined strip ---------- */
  .spotlight-wrap{
    max-width: 1240px;
    margin: 30px auto 0;
    padding: 0 clamp(16px, 4vw, 40px);
  }

  .spotlight-heading{
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--maroon);
    font-weight: 700;
    margin: 0 0 12px;
  }

  .spotlight-strip{
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 6px;
    scroll-snap-type: x proximity;
  }

  .spotlight-strip::-webkit-scrollbar{ height: 6px; }
  .spotlight-strip::-webkit-scrollbar-thumb{ background: var(--hairline); border-radius: 6px; }

  .spotlight-card{
    flex: 0 0 auto;
    width: 220px;
    scroll-snap-align: start;
    background: linear-gradient(135deg, var(--maroon-deep), var(--maroon) 65%, #8a2532);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    box-shadow: 0 8px 20px rgba(90,20,25,0.22);
    position: relative;
    overflow: hidden;
  }

  .spotlight-card::after{
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(140px 140px at 100% 0%, rgba(217,185,106,0.22), transparent 70%);
    pointer-events: none;
  }

  .spotlight-card img{
    width: 46px;
    height: 58px;
    object-fit: cover;
    border-radius: 6px;
    border: 2px solid rgba(217,185,106,0.55);
    flex-shrink: 0;
  }

  .spotlight-card-text{ min-width: 0; }

  .spotlight-card-name{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 15.5px;
    color: #fff;
    margin: 0 0 2px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spotlight-card-meta{
    font-size: 10.5px;
    color: #f2e6d3;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .spotlight-card-date{
    font-size: 10px;
    color: var(--gold-soft);
    font-weight: 600;
    margin-top: 3px;
  }
</style>
</head>

<body>

<header>
  <div class="logo-container">
    <img src="https://www.archdiocesechanganacherry.org//images/Arch_Logo.jpeg" alt="Archdiocese logo">
  </div>
  <p class="eyebrow">Archdiocese of Changanacherry</p>
  <h1>Priests Directory</h1>
  <div class="rule"></div>
</header>

<div id="spotlight-wrap" class="spotlight-wrap" style="display:none;">
  <p class="spotlight-heading">Recently Joined</p>
  <div class="spotlight-strip" id="spotlight-strip"></div>
</div>

<div class="controls">
  <input type="text" id="search-bar" placeholder="Search by name, parish, or forane…" oninput="filterPriests()">
</div>

<p id="priest-count">Total Priests: 0</p>

<div id="loading-message">Loading directory…</div>

<ul id="priests-list"></ul>

<script>

const jsonUrl = 'priests.json';
const parishUrl = 'parishes.json';

let allPriests = [];

const listEl = document.getElementById('priests-list');
const countEl = document.getElementById('priest-count');
const loadingEl = document.getElementById('loading-message');

/* Normalize */
function normalize(str) {
  return (str || '')
    .replace(/’/g, "'")
    .replace(/[^a-z0-9\s]/gi, '')
    .toLowerCase()
    .trim();
}

/* Fix photo */
function fixPhoto(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return url.replace(/^\.\/?/, 'https://myparish.archeparchybookkeeping.org/');
}

/* Check recent join date (30 days) */
function isRecent(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr);
  const diffDays = (new Date() - d) / (1000 * 60 * 60 * 24);
  return diffDays <= 30;
}

/* Get all appointments, one entry per priest (their latest ministry date), newest first */
function getRecentAppointments(priests) {
  const entries = [];

  priests.forEach(p => {
    let latestForPriest = null; // { ministry, date }

    p.ministries.forEach(m => {
      if (!m.join_date) return;
      const d = new Date(m.join_date);
      if (isNaN(d)) return;
      if (!latestForPriest || d > latestForPriest.date) {
        latestForPriest = { ministry: m, date: d };
      }
    });

    if (latestForPriest) {
      entries.push({ priest: p, ministry: latestForPriest.ministry, date: latestForPriest.date });
    }
  });

  entries.sort((a, b) => b.date - a.date);
  return entries;
}

/* Render the "Recently Joined" strip */
function renderSpotlight(priests) {
  const wrap = document.getElementById('spotlight-wrap');
  const stripEl = document.getElementById('spotlight-strip');
  const recent = getRecentAppointments(priests);

  if (recent.length === 0) {
    wrap.style.display = 'none';
    return;
  }

  stripEl.innerHTML = recent.map(entry => `
    <div class="spotlight-card">
      <img src="${fixPhoto(entry.priest.photo)}" alt="${entry.priest.name}">
      <div class="spotlight-card-text">
        <p class="spotlight-card-name">${entry.ministry.name_prefix || ''} ${entry.priest.name}</p>
        <p class="spotlight-card-meta">${entry.ministry.parish}, ${entry.ministry.place}</p>
        <p class="spotlight-card-date">${entry.date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</p>
      </div>
    </div>
  `).join('');

  wrap.style.display = 'block';
}

/* Load data */
async function loadData() {
  const [priestsRes, parishesRes] = await Promise.all([
    fetch(jsonUrl),
    fetch(parishUrl)
  ]);

  const priestsJson = await priestsRes.json();
  const parishesJson = await parishesRes.json();

  const parishes = parishesJson.data;

  allPriests = priestsJson.data.map(priest => {

    const ministries = (priest.current_ministry || []).map(m => {

      const match = parishes.find(p =>
        normalize(p.parish_name) === normalize(m.parish_name) &&
        normalize(p.parish_place) === normalize(m.parish_place)
      );

      return {
        parish: m.parish_name,
        place: m.parish_place,
        designation: m.ministry_designation_name,
        forane: match ? match.forane_name : '',
        primary: m.is_primary_ministry == 1,
        name_prefix: m.name_prefix || '',
        join_date: m.join_date || ''
      };
    });

    return {
      name: priest.name,
      nickname: priest.nickname,
      photo: priest.photo,
      ministries
    };
  });

  renderSpotlight(allPriests);
  display(allPriests);
  loadingEl.style.display = 'none';
}

/* Display priests */
function display(priests) {

  listEl.innerHTML = '';
  countEl.textContent = `Total Priests: ${priests.length}`;

  priests.forEach(p => {

    const hasRecent = p.ministries.some(m => isRecent(m.join_date));

    const prefix = p.ministries.find(m => m.primary)?.name_prefix || '';

    const ministriesHtml = p.ministries.map(m => `
      <div class="ministry-block">

        <div class="designation">
          ${m.designation}
        </div>

        <div class="parish">${m.parish}, ${m.place}</div>

        ${m.forane ? `<div class="forane">${m.forane}</div>` : ''}

        ${m.join_date ? `
          <div class="appointment-date">
            Appointed ${new Date(m.join_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
          </div>
        ` : ''}

      </div>
    `).join('');

    const li = document.createElement('li');
    li.className = 'priest-item' + (hasRecent ? ' recent-appointment' : '');

    li.innerHTML = `
      ${hasRecent ? '<div class="seal" title="Recently appointed"></div><div class="seal-label">New</div>' : ''}
      <img src="${fixPhoto(p.photo)}" alt="${p.name}" />
      <div class="priest-info">
        <h3>${prefix} ${p.name}</h3>
        ${p.nickname ? `<p class="nickname">${p.nickname}</p>` : ''}
        ${ministriesHtml}
      </div>
    `;

    listEl.appendChild(li);
  });
}

/* Search filter */
function filterPriests() {
  const q = normalize(document.getElementById('search-bar').value);

  const filtered = allPriests.filter(p =>
    normalize(p.name).includes(q) ||
    normalize(p.nickname).includes(q) ||
    p.ministries.some(m =>
      normalize(m.parish).includes(q) ||
      normalize(m.place).includes(q) ||
      normalize(m.designation).includes(q) ||
      normalize(m.forane).includes(q)
    )
  );

  display(filtered);
}

loadData();

</script>

</body>
</html>
