<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Archdiocese Changanacherry - Priests</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f7f8;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #1a5276;
      margin-top: 30px;
    }

    .logo-container {
      text-align: center;
      margin-top: 20px;
    }

    .logo-container img {
      width: 100px;
    }

    #search-bar {
      display: block;
      width: 90%;
      max-width: 500px;
      margin: 20px auto;
      padding: 12px;
      border-radius: 25px;
      border: 2px solid #1a5276;
    }

    #priest-count {
      text-align: center;
      font-weight: bold;
      color: #117864;
    }

    #priests-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* increased min width */
  gap: 20px;
  padding: 20px;
  list-style: none;
  max-width: 1200px;   /* Optional: limit container width to avoid stretching too far */
  margin: 0 auto;      /* center the grid on large screens */
  margin-left: auto;
  margin-right: auto;
}

    .priest-item {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .priest-item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .priest-item h3 {
      color: #117864;
      margin: 10px 0 5px;
    }

    #loading-message {
      text-align: center;
      margin: 40px;
      font-size: 18px;
    }

    /* Layout: image left, text right */
.priest-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  text-align: left;   /* ✅ FIX */
}

.priest-info {
  flex: 1;
  min-width: 0;
  text-align: left;   /* ✅ FORCE LEFT ALIGN */
}
/* Image styling */
.priest-item img {
  width: 80px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  flex-shrink: 0;
}

/* Text colors */
.priest-item h3 {
  color: #000;          /* ✅ black name */
  font-size: 16px;
  margin: 5px 0;
}

.designation {
  color: #1a5276;
  font-weight: bold;
  font-size: 14px;
}

.parish {
  color: #117864;
  font-size: 13px;
}

.forane {
  display: inline-block;
  background: #f4ecf7;
  color: #7d3c98;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 11px;
  margin-top: 3px;
}
  </style>
</head>

<body>

  <div class="logo-container">
    <img src="https://www.archdiocesechanganacherry.org//images/Arch_Logo.jpeg">
  </div>

  <h1>Priests Directory</h1>

  <input type="text" id="search-bar" placeholder="Search priests..." oninput="filterPriests()">

  <p id="priest-count">Total Priests: 0</p>

  <div id="loading-message">Loading...</div>

  <ul id="priests-list"></ul>

<script>
const jsonUrl = 'priests.json';
const parishUrl = 'parishes.json';
let allPriests = [];

const listEl = document.getElementById('priests-list');
const countEl = document.getElementById('priest-count');
const loadingEl = document.getElementById('loading-message');

function normalize(str) {
  return (str || '').toLowerCase().replace(/[^a-z]/g, '');
}

function fixPhoto(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return url.replace(/^\.\/?/, 'https://myparish.archeparchybookkeeping.org/');
}

async function loadData() {
  try {
    const [priestsRes, parishesRes] = await Promise.all([
      fetch(jsonUrl),
      fetch(parishUrl)
    ]);

    const priestsJson = await priestsRes.json();
    const parishesJson = await parishesRes.json();

    const parishes = parishesJson.data;

    allPriests = priestsJson.data.map(priest => {

      const ministries = (priest.current_ministry || []).map(m => {

        const match = parishes.find(p =>
          normalize(p.parish_name) === normalize(m.parish_name) &&
          normalize(p.parish_place) === normalize(m.parish_place)
        );

        return {
          parish: m.parish_name,
          place: m.parish_place,
          designation: m.ministry_designation_name,
          forane: match ? match.forane_name : '',
          primary: m.is_primary_ministry == 1
        };
      });

      return {
        name: priest.name,
        nickname: priest.nickname,
        photo: priest.photo,
        ministries
      };
    });

    display(allPriests);
    loadingEl.style.display = 'none';

  } catch (err) {
    loadingEl.innerText = "Failed to load data.";
    console.error(err);
  }
}

function display(priests) {
  listEl.innerHTML = '';
  countEl.textContent = `Total Priests: ${priests.length}`;

  priests.forEach(p => {

    const ministriesHtml = p.ministries.map(m => `
  <div style="margin-top:10px;">
    <p><b>${m.designation}${m.primary ? ' (Primary)' : ''}</b></p>
    <p>${m.parish}, ${m.place}</p>
    <p style="color:gray;">${m.forane || ''}</p>
  </div>
`).join('');

    const li = document.createElement('li');
    li.className = 'priest-item';

    li.innerHTML = `
  <img src="${fixPhoto(p.photo)}" />

  <div class="priest-info">
    <h3>${p.name || 'No Name'}</h3>
    ${p.nickname ? `<p>${p.nickname}</p>` : ''}

    ${p.ministries.map(m => `
  <div style="margin-top:8px; border-top:1px solid #eee; padding-top:6px;">
    
    <div class="designation">
      ${m.designation}${m.primary ? ' (Primary)' : ''}
    </div>

    <div class="parish">
      ${m.parish}, ${m.place}
    </div>

    ${m.forane ? `<div class="forane">${m.forane}</div>` : ''}

  </div>
`).join('')}
  </div>
`;

      

    listEl.appendChild(li);
  });
}

function filterPriests() {
  const q = document.getElementById('search-bar').value.toLowerCase();

  const filtered = allPriests.filter(p => {

    return (
      p.name?.toLowerCase().includes(q) ||
      p.nickname?.toLowerCase().includes(q) ||
      p.ministries.some(m =>
        m.parish?.toLowerCase().includes(q) ||
        m.designation?.toLowerCase().includes(q) ||
        m.forane?.toLowerCase().includes(q)
      )
    );
  });

  display(filtered);
}

loadData();
</script>

</body>
</html>
